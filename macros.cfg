
[gcode_macro PRINT_START]
gcode:
    
    {% set BED = params.BED|default(55)|int %}
    {% set EXTRUDER = params.EXTRUDER|default(205)|int %}
    G28 X Y
    # Loading extruder and bed temperature
    M104 S{EXTRUDER}
    M140 S{BED} 
    RESPOND PREFIX= MSG="Waiting for temperatures..."
    M117  Waiting for temperatures...
    M190 S{BED}
    RESPOND PREFIX= MSG="Waiting for thermal expansion..."
    M117 Waiting for thermal expansion...
    G4 P30000
    
    RESPOND PREFIX= MSG="Creating a mesh..."
    M117 Creating a mesh...
    G28
    Z_TILT_ADJUST
    BED_MESH_CALIBRATE
    M104 S{EXTRUDER}
    # Set material parameters
    # {% if bedTemp == 55 %} #PLA
    #     SET_PRESSURE_ADVANCE ADVANCE=0.066
    # {% endif %}
    # {% if bedTemp == 56 %} #PLA
    #     SET_PRESSURE_ADVANCE ADVANCE=0.0475
    # {% endif %}
    # {% if bedTemp == 80 %} #PETG
    #     SET_GCODE_OFFSET Z=0.08
    #     SET_PRESSURE_ADVANCE ADVANCE=0.0875 #Overture White
    # {% endif %}
    # {% if bedTemp == 105 %} #ABS
    #     SET_PRESSURE_ADVANCE ADVANCE=0.05
    # {% endif %}
    #SET_RETRACTION retract_length=1.0
    #SET_RETRACTION retract_speed=25
    #SET_RETRACTION unretract_extra_length=0
    #SET_RETRACTION unretract_speed=25
    
    # Move to prime position
    RESPOND PREFIX= MSG="Moving to prime position"
    M117 Moving to prime position
    G1 X55 Y-15 Z10 F5000.0
    {% if printer.extruder.temperature < params.EXTRUDER|float*0.98 %}
        M109 S{params.EXTRUDER|float*0.98} # wait till 0.85 of bed temp is reached, then continue  
    {% endif %}
    M104 S{EXTRUDER}
    
    RESPOND PREFIX= MSG="Priming the nozzle"
    M117 Priming the nozzle
    G92 E0
    G1 E20 F300
    G0 Z0.15
    G0 X55 Y-4 Z0.28 F1500.0
    G92 E0 ;Reset Extruder
    G1 X195 Y-4 Z0.28 F1500.0 E15 ;Draw the first line
    G1 X195 Y-2 Z0.28 F5000.0 ;Move to side a little
    G1 X55 Y-2 Z0.28 F1500.0 E30 ;Draw the second line
    G92 E0 ;Reset Extruder
    G10
    G1 Z2.0 F3000 ;Move Z Axis up

    RESPOND PREFIX= MSG="Printing..."
    M117 Printing...
    M117


[gcode_macro PRINT_END]
gcode:
    # Retract filament to prevent oozing
    G91
    G1 E-2
    # Absolute XY 
    G90
    # Disable hotend and heated bed
    TURN_OFF_HEATERS
    # Park toolhead
    Park_toolhead
    # Disable steppers
    BED_MESH_CLEAR

[gcode_macro PAUSE]
rename_existing: BASE_PAUSE
gcode:

    SAVE_GCODE_STATE NAME=PAUSE_state
    BASE_PAUSE
    G91
    G1 E-{2} F2100
    G1 Z{10}
    G90
    G1 X{230} Y{230} F6000
    G91

[gcode_macro RESUME]
rename_existing: BASE_RESUME
gcode:
    G91
    G1 E{s} F2100
    G90
    RESTORE_GCODE_STATE NAME=PAUSE_state MOVE=1
    BASE_RESUME

[gcode_macro CANCEL_PRINT]
rename_existing: BASE_CANCEL_PRINT
gcode:
    TURN_OFF_HEATERS
    CLEAR_PAUSE
    SDCARD_RESET_FILE
    BASE_CANCEL_PRINT
    # Raise nozzle by 10mm
    G91
    G1 Z10 F8000
    G90
    G1 X0 Y222 E-3 F8000
    DISABLE_MOTORS
    M106 S0 ; turn off fan
    M117 Print Canceled

[gcode_macro DISABLE_MOTORS]
gcode:
    M18


[gcode_macro PURGE_LINE]
gcode:
    G92 E0.0
    G1 E10.0 F1000.0 ; intro line
    G1 X169.0 E45.0 F1000.0 ; intro line
    G92 E0.0


[gcode_macro PRINT_END]
#   Use PRINT_END for the slicer ending script - please customise for your slicer of choice
gcode:
    # safe anti-stringing move coords
    {% set th = printer.toolhead %}
    {% set x_safe = th.position.x + 20 * (1 if th.axis_maximum.x - th.position.x > 20 else -1) %}
    {% set y_safe = th.position.y + 20 * (1 if th.axis_maximum.y - th.position.y > 20 else -1) %}
    {% set z_safe = [th.position.z + 2, th.axis_maximum.z]|min %}
    
    SAVE_GCODE_STATE NAME=STATE_PRINT_END
    
    M400                           ; wait for buffer to clear
    G92 E0                         ; zero the extruder
    G1 E-2.0 F3600                 ; retract filament
    
    TURN_OFF_HEATERS
    
    G90                                      ; absolute positioning
    G0 X{x_safe} Y{y_safe} Z{z_safe} F20000  ; move nozzle to remove stringing
    G0 X{th.axis_maximum.x//2} Y{th.axis_maximum.y - 2} F3600  ; park nozzle at rear
    M107                                     ; turn off fan
    
    BED_MESH_CLEAR
    RESTORE_GCODE_STATE NAME=STATE_PRINT_END



[bed_mesh]
speed: 150
horizontal_move_z: 35
mesh_min: 20, 20
mesh_max: 280,260
probe_count: 5,5
algorithm: bicubic
fade_start: 1
fade_end: 10
fade_target: 0


[idle_timeout]
timeout: 1800

[safe_z_home]
